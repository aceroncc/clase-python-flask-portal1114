<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h1>Iniciar Sesión</h1>

{% if mensaje %}
<p>{{ mensaje }}</p>
{% endif %}

<form method="POST">

    <label>Usuario:</label>
    <input type="text" name="usuario" required>

    <br><br>

    <label>Contraseña:</label>
    <input type="password" name="contraseña" required>

    <br><br>

    <button type="submit">Ingresar</button>

</form>

</body>
</html>
