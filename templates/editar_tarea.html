{% extends "base.html" %}

{% block title %}Editar Tarea{% endblock %}

{% block content %}

<h1>Editar Tarea</h1>

<form method="POST">

    <div class="mb-3">
        <label>Titulo</label>
        <input type="text" name="titulo" value="{{ tarea.titulo }}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Descripcion</label>
        <textarea name="descripcion" class="form-control">{{ tarea.descripcion }}</textarea>
    </div>

    <div class="mb-3">
        <label>Fecha Entrega</label>
        <input type="date" name="fecha_entrega" value="{{ tarea.fecha_entrega }}" class="form-control">
    </div>

    <button class="btn btn-warning">
        Guardar Cambios
    </button>

</form>

{% endblock %}
