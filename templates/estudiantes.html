<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudiantes</title>
</head>
<body>

<h1>Estudiantes Inscritos</h1>

{% if estudiantes %}
<table border="1">
    <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Programa</th>
    </tr>

    {% for estudiante in estudiantes %}
    <tr>
        <td>{{ estudiante.nombre }}</td>
        <td>{{ estudiante.email }}</td>
        <td>{{ estudiante.programa }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No hay estudiantes registrados.</p>
{% endif %}

</body>
</html>
